<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DoMu — музыка</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Manrope:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

  :root{
    --bg: #0B0C10;
    --panel: #14161D;
    --panel-2: #1C1F29;
    --text: #F5F3EE;
    --muted: #8A8F98;
    --violet: #7C5CFF;
    --pink: #FF6F91;
    --line: rgba(245,243,238,0.08);
  }
  *{ box-sizing: border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background: var(--bg);
    color: var(--text);
    font-family: 'Manrope', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    padding-bottom: 92px; /* место под нижний плеер */
  }

  /* ===== HEADER ===== */
  header{
    position: sticky; top:0; z-index: 50;
    display:flex; align-items:center; justify-content: space-between;
    padding: 18px 28px;
    background: rgba(11,12,16,0.75);
    backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--line);
  }
  .left-zone, .right-zone{ flex: 1 1 0; display:flex; align-items:center; }
  .right-zone{ justify-content:flex-end; gap:12px; }

  .menu-btn{
    width: 44px; height:44px; border-radius: 12px;
    border: 1px solid var(--line); background: var(--panel);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; gap:4px; flex-direction:column;
    transition: border-color .2s ease, background .2s ease;
  }
  .menu-btn:hover{ border-color: var(--violet); background: var(--panel-2); }
  .menu-btn span{ width: 18px; height:2px; background: var(--text); border-radius: 2px; transition: transform .25s ease, opacity .25s ease; }
  .menu-btn.active span:nth-child(1){ transform: translateY(6px) rotate(45deg); }
  .menu-btn.active span:nth-child(2){ opacity:0; }
  .menu-btn.active span:nth-child(3){ transform: translateY(-6px) rotate(-45deg); }

  .logo{
    font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 28px;
    letter-spacing: 0.5px; cursor:pointer;
    background: linear-gradient(90deg, var(--violet), var(--pink), #5CE1FF, var(--violet));
    background-size: 300% 100%;
    -webkit-background-clip: text; background-clip: text; color: transparent;
    animation: flow 6s ease-in-out infinite; user-select:none;
  }
  @keyframes flow{ 0%{background-position:0% 50%;} 50%{background-position:100% 50%;} 100%{background-position:0% 50%;} }

  .btn{
    font-family:'Manrope', sans-serif; font-weight:600; font-size: 14px;
    padding: 10px 20px; border-radius: 10px; cursor:pointer;
    border: 1px solid var(--line); transition: all .2s ease; background:transparent; color:var(--text);
  }
  .btn-login:hover{ background: var(--panel-2); border-color: var(--violet); }
  .btn-register{ background: linear-gradient(90deg, var(--violet), var(--pink)); color: #fff; border: none; }
  .btn-register:hover{ filter: brightness(1.12); transform: translateY(-1px); }

  .ad-banner{
    font-family:'Space Grotesk', sans-serif; font-weight:600; font-size: 13px;
    padding: 10px 18px; border-radius: 10px;
    background: linear-gradient(90deg, rgba(124,92,255,0.18), rgba(255,111,145,0.18));
    border: 1px solid var(--line);
    color: var(--text);
    letter-spacing: 0.3px;
    white-space: nowrap;
  }

  /* ===== SIDE MENU ===== */
  .side-menu{
    position: fixed; top:0; left:0; width: 280px; height:100%;
    background: var(--panel); border-right: 1px solid var(--line);
    transform: translateX(-100%); transition: transform .3s ease; z-index: 60;
    padding: 90px 24px 24px;
  }
  .side-menu.open{ transform: translateX(0); }
  .side-menu a{ display:block; color: var(--muted); text-decoration:none; font-size:15px; padding: 12px 0; border-bottom: 1px solid var(--line); }
  .side-menu a:hover{ color: var(--text); }

  /* ===== MAIN / TRACK LIST ===== */
  main{ max-width: 860px; margin: 0 auto; padding: 60px 24px 60px; }
  .section-label{ font-family:'JetBrains Mono', monospace; font-size: 12px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 18px; }
  .track-list{ display:flex; flex-direction:column; border-top: 1px solid var(--line); }
  .track{ display:flex; align-items:center; gap:16px; padding: 14px 10px; border-bottom: 1px solid var(--line); border-radius: 10px; cursor:pointer; transition: background .15s ease; }
  .track:hover, .track.playing{ background: var(--panel); }
  .track-index{ font-family:'JetBrains Mono', monospace; color: var(--muted); width: 24px; font-size: 13px; }
  .cover{ width: 46px; height:46px; border-radius: 8px; flex-shrink:0; }
  .track-info{ flex:1; min-width:0; }
  .track-title{ font-size:15px; font-weight:600; }
  .track-artist{ font-size:13px; color: var(--muted); }
  .track-duration{ font-family:'JetBrains Mono', monospace; font-size:13px; color: var(--muted); }
  .play-icon{ width:0; height:0; border-top: 6px solid transparent; border-bottom: 6px solid transparent; border-left: 9px solid var(--text); opacity:0; transition: opacity .15s ease; }
  .track:hover .play-icon{ opacity:1; }

  /* ===== BOTTOM PLAYER BAR ===== */
  #playerBar{
    position: fixed; bottom:0; left:0; right:0; z-index: 70;
    display:flex; flex-direction:column; gap:8px;
    background: rgba(20,22,29,0.95); backdrop-filter: blur(14px);
    border-top: 1px solid var(--line);
    padding: 10px 16px 14px;
    transform: translateY(100%);
    transition: transform .3s ease;
  }
  #playerBar.show{ transform: translateY(0); }

  .seek-row{ display:flex; align-items:center; gap:10px; width:100%; }
  #seek{
    flex:1; width:100%; accent-color: var(--violet);
    height: 4px; margin:0; cursor:pointer;
  }
  #time{ font-family:'JetBrains Mono', monospace; font-size:11px; color:var(--muted); white-space:nowrap; min-width:78px; text-align:right; }

  .player-row{ display:flex; align-items:center; gap:12px; }
  #playerBar .cover{ width:42px; height:42px; flex-shrink:0; }
  #playerMeta{ min-width:0; flex: 1 1 auto; overflow:hidden; }
  #playerMeta .track-title{ font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  #playerMeta .track-artist{ font-size:12px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .controls{ display:flex; align-items:center; gap:14px; flex-shrink:0; }
  .ctrl-btn{ width:36px; height:36px; border-radius:50%; border:1px solid var(--line); background:var(--panel-2); display:flex; align-items:center; justify-content:center; cursor:pointer; transition: border-color .2s ease, transform .15s ease; }
  .ctrl-btn:hover{ border-color: var(--violet); transform: scale(1.05); }
  #playPauseBtn{ width:44px; height:44px; background: linear-gradient(90deg, var(--violet), var(--pink)); border:none; }
  .icon-prev, .icon-next{ width:0; height:0; border-top:6px solid transparent; border-bottom:6px solid transparent; }
  .icon-prev{ border-right: 9px solid var(--text); margin-right:2px; }
  .icon-next{ border-left: 9px solid var(--text); margin-left:2px; }
  .icon-pause{ display:flex; gap:4px; }
  .icon-pause span{ width:4px; height:14px; background:#fff; border-radius:1px; }
  .icon-play{ width:0; height:0; border-top:7px solid transparent; border-bottom:7px solid transparent; border-left:11px solid #fff; margin-left:3px; }

  /* ===== MODAL AUTH ===== */
  .overlay{ position:fixed; inset:0; background: rgba(0,0,0,0.6); display:none; align-items:center; justify-content:center; z-index: 100; }
  .overlay.show{ display:flex; }
  .modal{ background: var(--panel); border:1px solid var(--line); border-radius: 16px; padding: 28px; width: 320px; }
  .modal h3{ margin:0 0 18px; font-family:'Space Grotesk', sans-serif; }
  .modal input{ width:100%; padding:10px 12px; margin-bottom:12px; border-radius:8px; border:1px solid var(--line); background: var(--panel-2); color:var(--text); font-family:'Manrope', sans-serif; }
  .modal .btn-register{ width:100%; text-align:center; margin-top:6px; }
  .modal .error{ color: var(--pink); font-size:13px; min-height:16px; margin-bottom:4px; }
  .modal .switch{ font-size:13px; color:var(--muted); margin-top:14px; text-align:center; cursor:pointer; }
  .modal .switch b{ color: var(--text); }
  .close-x{ float:right; cursor:pointer; color:var(--muted); }
</style>
</head>
<body>

<header>
  <div class="left-zone">
    <div class="menu-btn" id="menuBtn"><span></span><span></span><span></span></div>
  </div>

  <div class="logo">DoMu</div>

  <div class="right-zone">
    <div class="ad-banner">Этот сайт для Создателя</div>
  </div>
</header>

<div class="side-menu" id="sideMenu">
  <a href="#" id="homeLink">Главная</a>
</div>

<main>
  <div class="section-label">Сейчас играет · плейлист</div>
  <div class="track-list" id="trackList"></div>
</main>

<!-- Нижний плеер -->
<div id="playerBar">
  <div class="seek-row">
    <input type="range" id="seek" value="0" min="0" max="100" step="0.1">
    <div id="time">0:00 / 0:00</div>
  </div>
  <div class="player-row">
    <div class="cover" id="barCover"></div>
    <div id="playerMeta">
      <div class="track-title" id="barTitle">—</div>
      <div class="track-artist" id="barArtist">—</div>
    </div>
    <div class="controls">
      <div class="ctrl-btn" id="prevBtn"><div class="icon-prev"></div></div>
      <div class="ctrl-btn" id="playPauseBtn"><div class="icon-play" id="playIcon"></div></div>
      <div class="ctrl-btn" id="nextBtn"><div class="icon-next"></div></div>
    </div>
  </div>
</div>

<audio id="audio"></audio>

<script src="app.js"></script>
</body>
</html>
